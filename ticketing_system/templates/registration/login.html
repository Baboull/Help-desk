{% extends 'base.html' %}
{% block title %}Sign In — SupportHub{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="w-full max-w-[380px]">

        <!-- Brand icon + heading -->
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl mb-3" style="background:var(--bg-overlay);border:1px solid var(--border)">
                <svg class="w-6 h-6" style="color:var(--text-link)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/></svg>
            </div>
            <h1 class="text-xl font-semibold" style="color:var(--text-primary)">Sign in to SupportHub</h1>
        </div>

        <!-- Card -->
        <div class="card p-5" style="border-radius:8px">
            {% if form.errors %}
            <div class="mb-4 px-3 py-2 rounded-md text-xs font-medium" style="background:#3d1a1a;border:1px solid #5a1917;color:#f85149">
                Username or password is incorrect.
            </div>
            {% endif %}

            <form method="POST" action="{% url 'login' %}" class="space-y-4">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}" />

                <div>
                    <label class="block text-xs font-semibold mb-1.5" style="color:var(--text-primary)">Username</label>
                    <input name="username" type="text" autocomplete="username" required placeholder="Enter your username" class="form-input" />
                </div>
                <div>
                    <label class="block text-xs font-semibold mb-1.5" style="color:var(--text-primary)">Password</label>
                    <input name="password" type="password" autocomplete="current-password" required placeholder="••••••••" class="form-input" />
                </div>
                <button type="submit" class="btn-primary w-full justify-center">
                    Sign in
                </button>
            </form>
        </div>

        <!-- Divider -->
        <div class="card mt-4 px-5 py-4 text-center text-sm" style="border-radius:8px;color:var(--text-muted)">
            New to SupportHub?
            <a href="{% url 'register' %}" style="color:var(--text-link)" class="font-medium ml-1 hover:underline">Create an account</a>
        </div>
    </div>
</div>
{% endblock %}
